<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Authentication System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card auth-card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-key-fill text-primary fs-1 mb-3"></i>
                            <h2 class="card-title fw-bold">Forgot Password?</h2>
                            <p class="text-muted">No worries, we'll send you reset instructions</p>
                        </div>

                        <form action="reset-password.html" id="forgotPasswordForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" 
                                           placeholder="Enter your email address" required>
                                </div>
                                <div class="form-text">
                                    <i class="bi bi-info-circle me-1"></i>
                                    We'll send a password reset link to this email
                                </div>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send me-2"></i>Send Reset Link
                                </button>
                            </div>
                        </form>

                        <div class="text-center">
                            <a href="index.html" class="auth-link">
                                <i class="bi bi-arrow-left me-1"></i>Back to Login
                            </a>
                        </div>

                        <!-- Success Message (Hidden by default) -->
                        <div class="alert alert-success mt-3 d-none" id="successMessage">
                            <i class="bi bi-check-circle me-2"></i>
                            Password reset link has been sent to your email!
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const successMessage = document.getElementById('successMessage');
            
            // Add loading state
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            
            // Simulate API call
            setTimeout(() => {
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
                successMessage.classList.remove('d-none');
                
                // Redirect after showing success message
                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
